<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Richiesta ricevuta | SalonePro</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #211820;
        background: #f8f2eb;
      }

      main {
        width: min(620px, calc(100vw - 40px));
        padding: 42px;
        border: 1px solid rgba(33, 24, 32, 0.14);
        background: #fffaf4;
        box-shadow: 0 24px 80px rgba(42, 30, 38, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 26px;
        color: #6c5f68;
        font-size: 1.08rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        padding: 12px 18px;
        border-radius: 999px;
        color: #211820;
        background: #f6cf4b;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Richiesta ricevuta.</h1>
      <p>Ti ricontattiamo su WhatsApp per preparare la demo guidata del gestionale.</p>
      <a href="/">Torna al sito</a>
    </main>
  </body>
</html>
